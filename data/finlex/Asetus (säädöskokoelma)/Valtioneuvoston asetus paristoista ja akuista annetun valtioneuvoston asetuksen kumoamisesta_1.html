<h1>Valtioneuvoston asetus paristoista ja akuista annetun valtioneuvoston asetuksen kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään: </p>
<h3>1 §</h3>
<p>
                                 Tällä asetuksella kumotaan paristoista ja akuista annettu valtioneuvoston asetus 
                                <a href="https://www.finlex.fi/akn/fi/act/statute-consolidated/2014/520" rel="noopener noreferrer" target="_blank">(520/2014)</a>. 
                            </p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 2026.</p>
