<h1>Valtioneuvoston asetus kaasulaiteasetuksen kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan kaasulaiteasetus (1434/1993).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä joulukuuta 2018.</p>
