<h1>Asetus avioliittoasetuksen 14 §:n 1 momentin 3 kohdan kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 6 päivänä marraskuuta 1987 annetun avioliittoasetuksen (820/87) 14 §:n 1 momentin 3 kohta.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1992.</p>
