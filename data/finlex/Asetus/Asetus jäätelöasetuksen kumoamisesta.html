<h1>Asetus jäätelöasetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 6 päivänä helmikuuta 1981 annettu jäätelöasetus (108/1981).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä helmikuuta 1999.</p>
