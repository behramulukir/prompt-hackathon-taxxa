<h1>Asetus maa-ainesasetuksen 2 §:n 4 momentin kumoamisesta</h1>
<p>Ympäristöministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 5 päivänä helmikuuta 1982 annetun maa-ainesasetuksen (91/82) 2 §:n 4 momentti.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1992.</p>
