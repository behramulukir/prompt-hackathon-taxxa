<h1>Asetus kriminaalihuoltotyön valtionavusta annetun asetuksen 2 §:n kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan kriminaalihuoltotyön valtionavusta 21 päivänä helmikuuta 1975 annetun asetuksen (134/75) 2 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä marraskuuta 1995.</p>
