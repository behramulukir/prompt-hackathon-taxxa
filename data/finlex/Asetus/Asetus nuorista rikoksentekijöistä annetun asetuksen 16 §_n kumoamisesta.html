<h1>Asetus nuorista rikoksentekijöistä annetun asetuksen 16 §:n kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään: </p>
<h3>1 §</h3>
<p>Täten kumotaan nuorista rikoksentekijöistä 18 päivänä joulukuuta 1942 annetun asetuksen (1001/42) 16 §. </p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 1992.</p>
