<h1>Asetus tilintarkastuslain 14 §:n voimaantulosta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tilintarkastuslain (936/94) 14 § tulee voimaan 1 päivänä huhtikuuta 1996.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 1996.</p>
