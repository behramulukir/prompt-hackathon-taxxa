<h1>Asetus maitojauheesta annetun asetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1  §</h3>
<p>Täten kumotaan 22 päivänä toukokuuta 1964 annettu asetus maitojauheesta (278/64).</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1996.</p>
