<h1>Asetus evankelis-luterilaisen kirkon eläkeasetuksen 5§:n kumoamisesta</h1>
<p>Opetusministeriön esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 9 päivänä joulukuuta 1966 annetun evankelis-luterilaisen kirkon eläkeasetuksen (618/66) 5§.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1991.</p>
