<h1>Asetus valtion virkojen muuttamisesta</h1>
<p>Valtiovarainministerin esittelystä säädetään 19 päivänä elokuuta 1994 annetun valtion virkamieslain (750/94) nojalla:</p>
<h3>1  §</h3>
<p>Valtion perus- ja sopimuspalkkaiset virat muuttuvat valtion viroiksi.</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 1995.</p>
