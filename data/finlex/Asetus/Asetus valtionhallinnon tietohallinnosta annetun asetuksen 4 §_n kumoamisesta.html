<h1>Asetus valtionhallinnon tietohallinnosta annetun asetuksen 4 §:n kumoamisesta</h1>
<p>Valtiovarainministeriön esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan valtionhallinnon tietohallinnosta 12 päivänä helmikuuta 1988 annetun asetuksen (155/88) 4 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1993.</p>
