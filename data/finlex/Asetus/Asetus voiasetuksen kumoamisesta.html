<h1>Asetus voiasetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1  §</h3>
<p>Täten kumotaan 6 päivänä toukokuuta 1966 annettu voiasetus (276/66).</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1996.</p>
