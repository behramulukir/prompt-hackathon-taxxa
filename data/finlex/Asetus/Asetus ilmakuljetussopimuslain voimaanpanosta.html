<h1>Asetus ilmakuljetussopimuslain voimaanpanosta</h1>
<p>Oikeusministerin esittelystä säädetään 14 päivänä tammikuuta 1977 annetun ilmakuljetussopimuslain (45/77) 42 §:n nojalla: </p>
<h3>1§</h3>
<p>Tammikuun 14 päivänä 1977 annettu ilmakuljetussopimuslaki (45/77) tulee voimaan 1 päivänä helmikuuta 1977. </p>
