<h1>Asetus verotusasetuksen 3 §:n kumoamisesta</h1>
<p>Valtiovarainministerin esittelystä säädetään:</p>
<h3>1  §</h3>
<p>Täten kumotaan 30 päivänä joulukuuta 1959 annetun verotusasetuksen (530/59) 3 § siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1995.</p>
