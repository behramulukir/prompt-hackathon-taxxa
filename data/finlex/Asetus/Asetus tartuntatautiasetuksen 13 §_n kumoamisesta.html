<h1>Asetus tartuntatautiasetuksen 13 §:n kumoamisesta</h1>
<p>Sosiaali- ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 31 päivänä lokakuuta 1986 annetun tartuntatautiasetuksen (786/86) 13 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1993.</p>
