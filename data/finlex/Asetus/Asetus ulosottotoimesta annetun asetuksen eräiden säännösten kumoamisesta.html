<h1>Asetus ulosottotoimesta annetun asetuksen eräiden säännösten kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan ulosottotoimesta 8 päivänä helmikuuta 1985 annetun asetuksen (158/85) 17-19§.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä helmikuuta 1990.</p>
