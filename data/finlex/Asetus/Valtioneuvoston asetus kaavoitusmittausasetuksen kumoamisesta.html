<h1>Valtioneuvoston asetus kaavoitusmittausasetuksen kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan kaavoitusmittausasetus (1284/1999).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä toukokuuta 2014.</p>
