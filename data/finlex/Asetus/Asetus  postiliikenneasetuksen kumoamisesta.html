<h1>Asetus  postiliikenneasetuksen kumoamisesta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 10 päivänä lokakuuta 1980 annettu postiliikenneasetus (692/80) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1991.</p>
