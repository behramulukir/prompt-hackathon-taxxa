<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 6 päivänä huhtikuuta 1962 annetun vesiasetuksen (282/62) 16§.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1987.</p>
