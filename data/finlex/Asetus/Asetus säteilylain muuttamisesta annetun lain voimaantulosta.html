<h1>Asetus säteilylain muuttamisesta annetun lain voimaantulosta</h1>
<p>Sosiaali- ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Säteilylain muuttamisesta annettu laki (1334/94) tulee voimaan 1 päivänä tammikuuta 1995.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivän  tammikuuta 1995.</p>
