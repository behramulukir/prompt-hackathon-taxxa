<h1>Asetus merenkulkuhallinnosta annetun asetuksen 24 §:n kumoamisesta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan merenkulkuhallinnosta 26 päivänä lokakuuta 1925 annetun asetuksen (299/25) 24 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 1996.</p>
