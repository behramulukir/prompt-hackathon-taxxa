<h1>Kauppa- ja teollisuusministeriön asetus etikasta annetun asetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministeriön päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 27 päivänä elokuuta 1965 etikasta annettu asetus (476/1965).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 2006.</p>
