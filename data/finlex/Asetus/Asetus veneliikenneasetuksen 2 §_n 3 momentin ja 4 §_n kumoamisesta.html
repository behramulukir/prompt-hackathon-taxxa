<h1>Asetus veneliikenneasetuksen 2 §:n 3 momentin ja 4 §:n kumoamisesta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 28 päivänä helmikuuta 1969 annetun veneliikenneasetuksen (152/69) 2 §:n 3 momentti ja 4 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1996.</p>
