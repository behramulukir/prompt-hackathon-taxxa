<h1>Oikeusministeriön asetus hovioikeuksien istuntopaikoista</h1>
<p>
                    Oikeusministeriön päätöksen mukaisesti säädetään tuomioistuinlain 
                    <a href="https://www.finlex.fi/akn/fi/act/statute-consolidated/2016/673#chp_3__sec_6" rel="noopener noreferrer" target="_blank">(673/2016) 3 luvun 6 §:n</a>
                     1 momentin nojalla:
                </p>
<h3>1 §</h3>
<p>Itä-Suomen hovioikeudella on pysyvä istuntopaikka Kouvolassa. </p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 2017.</p>
