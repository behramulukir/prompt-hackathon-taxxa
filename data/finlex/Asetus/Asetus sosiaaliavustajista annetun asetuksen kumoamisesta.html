<h1>Asetus sosiaaliavustajista annetun asetuksen kumoamisesta</h1>
<p>sosiaali- ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan sosiaaliavustajista 7 päivänä huhtikuuta 1989 annettu asetus (334/89).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1991.</p>
