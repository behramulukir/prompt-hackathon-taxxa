<h1>Asetus ulkomaanedustuksesta annetun asetuksen 32 ja 33 §:n kumoamisesta</h1>
<p> Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan ulkomaanedustuksesta 25 päivänä maaliskuuta 1964 annetun asetuksen (159/64) 32 ja 33 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä marraskuuta 1993.</p>
