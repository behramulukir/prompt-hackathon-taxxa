<h1>Asetus luopumiseläkeasetuksen 15 §:n kumoamisesta</h1>
<p>Sosiaali- ja terveysministerin esittelystä säädetään:</p>
<p>Täten kumotaan 29 päivänä maaliskuuta 1974 annetun luopumiseläkeasetuksen (258/74) 15 §.</p>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1977.</p>
