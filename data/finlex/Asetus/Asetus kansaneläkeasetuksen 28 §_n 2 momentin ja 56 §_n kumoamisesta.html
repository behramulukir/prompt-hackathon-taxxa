<h1>Asetus kansaneläkeasetuksen 28 §:n 2 momentin ja 56 §:n kumoamisesta</h1>
<p>Sosiaali- ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 7 päivänä joulukuuta 1956 annetun kansaneläkeasetuksen (594/56) 28 §:n 2 momentti ja 56 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä lokakuuta 1991.</p>
