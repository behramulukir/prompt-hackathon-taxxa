<h1>Asetus polttohautauksesta annetun asetuksen kumoamisesta</h1>
<p>Sisäasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan polttohautauksesta 7 päivänä kesäkuuta 1945 annettu asetus (549/45) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä marras&gt;kuuta 1989.</p>
