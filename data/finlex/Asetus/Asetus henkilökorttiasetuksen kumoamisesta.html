<h1>Asetus henkilökorttiasetuksen kumoamisesta</h1>
<p>Sisäasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 21 päivänä syyskuuta 1990 annettu henkilökorttiasetus (867/1999).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä joulukuuta 1999.</p>
