<h1>Asetus jäteasetuksen 19 §:n kumoamisesta</h1>
<p>Ympäristöministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 22 päivänä joulukuuta 1993 annetun jäteasetuksen (1390/1993) 19 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 29 päivänä helmikuuta 2000.</p>
