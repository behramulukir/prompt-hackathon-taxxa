<h1>Asetus luotsauslain voimaantulosta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Helmikuun 6 päivänä 1998 annettu luotsauslaki (90/1998) tulee voimaan 1 päivänä maaliskuuta 1998.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 1998.</p>
