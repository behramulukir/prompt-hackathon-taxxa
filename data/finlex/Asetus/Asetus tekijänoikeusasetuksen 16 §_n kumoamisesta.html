<h1>Asetus tekijänoikeusasetuksen 16 §:n kumoamisesta</h1>
<p>Opetusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 21 päivänä huhtikuuta 1995 annetun tekijänoikeusasetuksen (574/95) 16 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 25 päivänä maaliskuuta 1996.</p>
