<h1>Valtioneuvoston asetus ajoneuvojen käytöstä tiellä annetun asetuksen 50 §:n kumoamisesta</h1>
<p>Valtioneuvoston päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan ajoneuvon käytöstä tiellä annetun asetuksen (1257/1992) 50 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 2018.</p>
