<h1>Asetus jäteasetuksen 24 §:n kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 22 päivänä joulukuuta 1993 annetun jäteasetuksen (1390/1993) 24 §, sellaisena kuin se on asetuksessa 775/1997.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä lokakuuta 1999.</p>
