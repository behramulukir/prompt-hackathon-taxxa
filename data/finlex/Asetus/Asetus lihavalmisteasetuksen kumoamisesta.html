<h1>Asetus lihavalmisteasetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 28 päivänä lokakuuta 1988 annettu lihavalmisteasetus (902/88).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 29 päivänä maaliskuuta 1996.</p>
