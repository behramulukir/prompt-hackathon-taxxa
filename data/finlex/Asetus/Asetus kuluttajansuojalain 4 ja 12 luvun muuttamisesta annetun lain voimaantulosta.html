<h1>Asetus kuluttajansuojalain 4 ja 12 luvun muuttamisesta annetun lain voimaantulosta</h1>
<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Laki kuluttajansuojalain 4 ja 12 luvun muuttamisesta (416/1999) tulee voimaan 1 päivänä huhtikuuta 1999.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 1999.</p>
