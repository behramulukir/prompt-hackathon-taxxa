<h1>Asetus ulkoasiainhallintoasetuksen 33 §:n kumoamisesta</h1>
<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 10 päivänä helmikuuta 1995 annetun ulkoasiainhallintoasetuksen (166/1995) 33 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä joulukuuta 1999.</p>
