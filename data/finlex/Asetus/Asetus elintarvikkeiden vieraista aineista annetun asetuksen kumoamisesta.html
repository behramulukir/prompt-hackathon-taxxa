<h1>Asetus elintarvikkeiden vieraista aineista annetun asetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 24 päivänä elokuuta 1990 annettu asetus elintarvikkeiden vieraista aineista (755/90).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 1996.</p>
