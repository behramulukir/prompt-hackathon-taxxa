<h1>Asetus lukioasetuksen 39 §:n kumoamisesta</h1>
<p>Opetusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 12 päivänä lokakuuta 1984 annetun lukioasetuksen (719/1984) 39 §, sellaisena kuin se on asetuksessa 689/1993.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1997.</p>
