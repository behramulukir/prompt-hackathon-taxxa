<h1>Asetus virkalähetysoikeudesta postiliikenteessä annetun asetuksen kumoamisesta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan virkalähetysoikeudesta postiliikenteessä 8 päivänä joulukuuta 1989 annettu asetus (1098/89).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1993.</p>
