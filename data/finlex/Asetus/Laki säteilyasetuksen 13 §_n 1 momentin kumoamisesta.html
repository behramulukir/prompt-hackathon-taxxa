<h1>Laki säteilyasetuksen 13 §:n 1 momentin kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Tällä lailla kumotaan säteilyasetuksen (1512/1991) 13 §:n 1 momentti, sellaisena kuin se on asetuksessa 1143/1998.</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä kesäkuuta 2017.</p>
