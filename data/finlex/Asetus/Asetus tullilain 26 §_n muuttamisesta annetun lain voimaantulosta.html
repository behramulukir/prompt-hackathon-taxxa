<h1>Asetus tullilain 26 §:n muuttamisesta annetun lain voimaantulosta</h1>
<p>Sisäasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tullilain 26 §:n muuttamisesta 30 päivänä joulukuuta 1997 annettu laki (694/1998) tulee voimaan 1 päivänä lokakuuta 1998.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä lokakuuta 1998.</p>
