<h1>Asetus alusten radioasemien katsastusmaksuista annetun asetuksen kumoamisesta</h1>
<h3>1 §</h3>
<p>Liikenneministerin esittelystä kumotaan alusten radioasemien katsastusmaksuista 8 päivänä joulukuuta 1989 annettu asetus (1100/89). </p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä toukokuuta 1992.</p>
