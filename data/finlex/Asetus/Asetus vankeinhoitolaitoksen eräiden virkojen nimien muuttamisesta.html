<h1>Asetus vankeinhoitolaitoksen eräiden virkojen nimien muuttamisesta</h1>
<p>Oikeusministerin esittelystä säädetään 24 päivänä lokakuuta 1986 annetun valtion virkamieslain (755/86) 7§:n 1 momentin nojalla:</p>
<h3>1 §</h3>
<p>Muutetaan:</p>
<ul><li>
<i>Vankeinhoitolaitos</i>
</li></ul>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä joulukuuta 1990.</p>
