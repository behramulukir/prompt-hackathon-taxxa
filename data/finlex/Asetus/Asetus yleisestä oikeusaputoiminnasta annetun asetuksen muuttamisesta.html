<h1>Asetus yleisestä oikeusaputoiminnasta annetun asetuksen muuttamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1§</h3>
<p>Täten kumotaan yleisestä oikeusaputoiminnasta 10 päivänä elokuuta 1973 annetun asetuksen (651/73) 5-7§.</p>
<h3>2§</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 1991.</p>
