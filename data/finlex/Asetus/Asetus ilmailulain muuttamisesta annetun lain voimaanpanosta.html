<h1>Asetus ilmailulain muuttamisesta annetun lain voimaanpanosta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Ilmailulain muuttamisesta 25 päivänä tammikuuta 1993 annettu laki (70/93) tulee voimaan 1 päivänä tammikuuta 1994.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1994.</p>
