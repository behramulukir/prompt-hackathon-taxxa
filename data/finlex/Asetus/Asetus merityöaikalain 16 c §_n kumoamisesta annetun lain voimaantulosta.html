<h1>Asetus merityöaikalain 16 c §:n kumoamisesta annetun lain voimaantulosta</h1>
<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Laki merityöaikalain 16 c §:n kumoamisesta (406/1999) tulee voimaan 1 päivänä huhtikuuta 1999.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 1999.</p>
