<h1>Asetus telemarkkina-asetuksen 9 ja 10 §:n kumoamisesta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 7 päivänä toukokuuta 1997 annetun telemarkkina-asetuksen (424/1997) 9 ja 10 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1999.</p>
