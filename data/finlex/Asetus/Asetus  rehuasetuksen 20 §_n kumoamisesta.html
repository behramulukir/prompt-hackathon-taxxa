<h1>Asetus  rehuasetuksen 20 §:n kumoamisesta</h1>
<p>Maa- ja metsätalousministerin esittelystä säädetään: </p>
<h3>1 §</h3>
<p>Täten kumotaan 16 päivänä toukokuuta 1986 annetun rehuasetuksen (379/86) 20 §. </p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä elokuuta 1992. </p>
