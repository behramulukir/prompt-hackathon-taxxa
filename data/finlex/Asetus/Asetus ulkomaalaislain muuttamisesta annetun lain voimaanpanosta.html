<h1>Asetus ulkomaalaislain muuttamisesta annetun lain voimaanpanosta</h1>
<p>Sisäasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Ulkomaalaislain muuttamisesta 28 päivänä kesäkuuta 1993 annettu laki (640/93) tulee voimaan 1 päivänä tammikuuta 1994.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1994.</p>
