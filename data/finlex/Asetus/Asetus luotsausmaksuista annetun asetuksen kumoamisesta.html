<h1>Asetus luotsausmaksuista annetun asetuksen kumoamisesta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan luotsausmaksuista 29 päivänä elokuuta 1980 annettu asetus (625/80) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1993.</p>
