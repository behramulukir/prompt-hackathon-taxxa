<h1>Asetus viljantutkimustoimikunnasta annetun asetuksen kumoamisesta</h1>
<p>Maa- ja metsätalousministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan viljantutkimustoimikunnasta 10 päivänä toukokuuta 1968 annettu asetus (259/68).</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1988.</p>
