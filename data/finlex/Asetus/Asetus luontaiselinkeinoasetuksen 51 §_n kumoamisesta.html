<h1>Asetus luontaiselinkeinoasetuksen 51 §:n kumoamisesta</h1>
<p>Maa- ja metsätalousministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 8 päivänä maaliskuuta 1991 annetun luontaiselinkeinoasetuksen (492/1991) 51 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 23 päivänä kesäkuuta 1999.</p>
