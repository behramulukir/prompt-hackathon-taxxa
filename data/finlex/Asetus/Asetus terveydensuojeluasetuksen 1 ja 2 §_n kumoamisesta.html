<h1>Asetus terveydensuojeluasetuksen 1 ja 2 §:n kumoamisesta</h1>
<p>Ympäristöministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 16 päivänä joulukuuta 1994 annetun terveydensuojeluasetuksen (1280/1994) 1 ja 2 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 2000.</p>
