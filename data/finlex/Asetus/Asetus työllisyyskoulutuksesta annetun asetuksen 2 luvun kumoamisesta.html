<h1>Asetus työllisyyskoulutuksesta annetun asetuksen 2 luvun kumoamisesta</h1>
<p>Työvoimaministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan työllisyyskoulutuksesta 27 päivänä helmikuuta 1976 annetun asetuksen (206/76) 2 luku.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä kesä&gt;kuuta 1989.</p>
