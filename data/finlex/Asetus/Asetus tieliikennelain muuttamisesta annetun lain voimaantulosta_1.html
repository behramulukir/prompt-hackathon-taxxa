<h1>Asetus tieliikennelain muuttamisesta annetun lain voimaantulosta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tieliikennelain muuttamisesta 28 päivänä kesäkuuta 1994 annettu laki (571/94) tulee voimaan 1 päivänä heinäkuuta 1994.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä heinäkuuta 1994.</p>
