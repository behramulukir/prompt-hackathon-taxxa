<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Laki merimieslain 87 §:n kumoamisesta (404/1999) tulee voimaan 1 päivänä huhtikuuta 1999.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä huhtikuuta 1999.</p>
