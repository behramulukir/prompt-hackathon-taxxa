<h1>Asetus sairausvakuutusasetuksen 7 §:n kumoamisesta</h1>
<p>Sosiaali– ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 1 päivänä marraskuuta 1963 annetun sairausvakuutusasetuksen (473/63) 7 § siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1995.</p>
