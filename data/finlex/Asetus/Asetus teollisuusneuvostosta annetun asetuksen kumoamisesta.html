<h1>Asetus teollisuusneuvostosta annetun asetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 3 päivänä helmikuuta 1995 annettu asetus (161/1995) teollisuusneuvostosta.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä marraskuuta 1999.</p>
