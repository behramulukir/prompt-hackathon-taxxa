<h1>Laki etuoikeusasetuksen 7 a§:n kumoamisesta</h1>
<p>Eduskunnan päätöksen mukaisesti säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan etuoikeusasetuksen 7 a§, sellaisena kuin se on 9 päivänä kesäkuuta 1939 annetussa laissa (169/39).</p>
<h3>2 §</h3>
<p>Tämä laki tulee voimaan 1 päivänä tammikuuta 1989.</p>
