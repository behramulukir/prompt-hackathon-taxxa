<h1>Asetus kouluasiainneuvostosta annetun asetuksen kumoamisesta</h1>
<p>Opetusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan kouluasiainneuvostosta 28 päivänä heinäkuuta 1967 annettu asetus (355/67) siihen myöhemmin tehtyine muutoksineen.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1992.</p>
