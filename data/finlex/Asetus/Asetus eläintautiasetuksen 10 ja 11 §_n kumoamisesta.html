<h1>Asetus eläintautiasetuksen 10 ja 11 §:n kumoamisesta</h1>
<p>Maa- ja metsätalousministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 15 päivänä elokuuta 1980 annetun eläintautiasetuksen (601/1980) 10 ja 11 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 1998.</p>
