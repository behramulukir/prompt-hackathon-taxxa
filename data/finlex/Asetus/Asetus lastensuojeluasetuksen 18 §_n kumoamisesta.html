<h1>Asetus lastensuojeluasetuksen 18 §:n kumoamisesta</h1>
<p>Opetusministerin esittelystä säädetään</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 16 päivänä joulukuuta 1983 annetun lastensuojeluasetuksen (1010/1983) 18 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1999.</p>
