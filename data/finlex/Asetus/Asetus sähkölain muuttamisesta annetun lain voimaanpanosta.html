<h1>Asetus sähkölain muuttamisesta annetun lain voimaanpanosta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Sähkölain muuttamisesta 29 päivänä tammikuuta 1993 annettu laki (142/93) tulee voimaan 1 päivänä tammikuuta 1994.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1994.</p>
