<h1>Asetus työnvälityslain täytäntöönpanosta annetun asetuksen 3 ja 7§:n kumoamisesta</h1>
<p>Työvoimaministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan työnvälityslain täytäntöönpanosta 2 päivänä kesäkuuta 1959 annetun asetuksen (247/59) 3 ja 7§.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä kesä&gt;kuuta 1989.</p>
