<h1>Asetus rakennussuojeluasetuksen 2 §:n kumoamisesta</h1>
<p>Ympäristöministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 26 päivänä elokuuta 1988 annetun rakennussuojeluasetuksen (783/88) 2 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1994.</p>
