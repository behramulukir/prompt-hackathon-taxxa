<h1>Asetus perhe-eläkeasetuksen 3 §:n 2 momentin kumoamisesta</h1>
<p>Sosiaali- ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 4 päivänä heinäkuuta 1969 annetun perhe-eläkeasetuksen (449/1969) 3 §:n 2 momentti.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 2000.</p>
