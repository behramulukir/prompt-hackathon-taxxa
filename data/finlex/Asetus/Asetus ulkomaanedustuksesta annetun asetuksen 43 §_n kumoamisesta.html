<h1>Asetus ulkomaanedustuksesta annetun asetuksen 43 §:n kumoamisesta</h1>
<p>Ulkoasiainministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 25 päivänä maaliskuuta 1964 ulkomaanedustuksesta annetun asetuksen (159/1964) 43 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä helmikuuta 1997.</p>
