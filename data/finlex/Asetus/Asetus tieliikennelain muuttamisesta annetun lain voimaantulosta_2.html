<h1>Asetus tieliikennelain muuttamisesta annetun lain voimaantulosta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1  §</h3>
<p>Tieliikennelain muuttamisesta 7 päivänä huhtikuuta 1995 annettu laki (521/95) tulee voimaan 1 päivänä lokakuuta 1995.</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänälokakuuta 1995.</p>
