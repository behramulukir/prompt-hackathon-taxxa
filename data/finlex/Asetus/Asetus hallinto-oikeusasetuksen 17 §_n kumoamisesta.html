<h1>Asetus hallinto-oikeusasetuksen 17 §:n kumoamisesta</h1>
<p>Ympäristöministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tällä asetuksella kumotaan 23 päivänä maaliskuuta 1999 annetun hallinto-oikeusasetuksen (438/1999) 17 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 2000.</p>
