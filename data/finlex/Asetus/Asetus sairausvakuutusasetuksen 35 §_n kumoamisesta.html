<h1>Asetus sairausvakuutusasetuksen 35 §:n kumoamisesta</h1>
<p>Sosiaali- ja terveysministeriön toimialaan kuuluvia asioita käsittelemään määrätyn ministerin esittelystä säädetään:</p>
