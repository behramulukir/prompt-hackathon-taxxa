<h1>Asetus tieliikennelain muuttamisesta annetun lain voimaantulosta</h1>
<p>Liikenneministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Tieliikennelain muuttamisesta 23 päivänä joulukuuta 1998 annettu laki (735/1999) tulee voimaan 15 päivänä elokuuta 1999.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 15 päivänä elokuuta 1999.</p>
