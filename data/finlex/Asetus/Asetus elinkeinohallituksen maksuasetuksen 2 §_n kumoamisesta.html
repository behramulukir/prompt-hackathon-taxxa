<h1>Asetus elinkeinohallituksen maksuasetuksen 2 §:n kumoamisesta</h1>
<p>Sosiaali- ja terveysministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 8 päivänä heinäkuuta 1983 annetun elinkeinohallituksen maksuasetuksen (629/83) 2 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1988.</p>
