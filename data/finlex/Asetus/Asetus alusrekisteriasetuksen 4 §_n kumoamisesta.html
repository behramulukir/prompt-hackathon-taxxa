<h1>Asetus alusrekisteriasetuksen 4 §:n kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan 15 päivänä lokakuuta 1993 annetun alusrekisteriasetuksen (874/93) 4 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä joulukuuta 1994.</p>
