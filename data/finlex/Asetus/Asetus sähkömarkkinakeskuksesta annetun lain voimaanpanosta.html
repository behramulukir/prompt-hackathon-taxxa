<h1>Asetus sähkömarkkinakeskuksesta annetun lain voimaanpanosta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1  §</h3>
<p>Sähkömarkkinakeskuksesta 17 päivänä maaliskuuta 1995 annettu laki (387/95) tulee voimaan 1 päivänä toukokuuta 1995.</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä toukokuuta 1995.</p>
