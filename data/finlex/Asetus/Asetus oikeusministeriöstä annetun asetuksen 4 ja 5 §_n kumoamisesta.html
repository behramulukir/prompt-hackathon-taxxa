<h1>Asetus oikeusministeriöstä annetun asetuksen 4 ja 5 §:n kumoamisesta</h1>
<p>Oikeusministerin esittelystä säädetään:</p>
<h3>1 §</h3>
<p>Täten kumotaan oikeusministeriöstä 24 päivänä maaliskuuta 1995 annetun asetuksen (457/95) 4 ja 5 §.</p>
<h3>2 §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä maaliskuuta 1996.</p>
