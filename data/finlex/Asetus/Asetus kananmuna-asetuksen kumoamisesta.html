<h1>Asetus kananmuna-asetuksen kumoamisesta</h1>
<p>Kauppa- ja teollisuusministerin esittelystä säädetään:</p>
<h3>1  §</h3>
<p>Täten kumotaan 11 päivänä marraskuuta 1977 annettu kananamuna-asetus (799/77).</p>
<h3>2  §</h3>
<p>Tämä asetus tulee voimaan 1 päivänä tammikuuta 1996.</p>
